version: '3.8'

services:
  crm:
    image: ${IMAGE:-angelomoreirafilho/crm:latest}
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    environment:
      NODE_ENV: production
      # Supabase (service_role só para webhook — nunca expor no build)
      SUPABASE_SERVICE_ROLE_KEY: ""
      # Evolution API
      EVOLUTION_API_URL: "http://evolution:8080"
      EVOLUTION_API_KEY: ""
      EVOLUTION_WEBHOOK_TOKEN: ""
      # Descomente para ativar agente de IA:
      # AI_AGENT_ENABLED: "true"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
